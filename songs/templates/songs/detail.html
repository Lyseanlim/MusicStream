<!DOCTYPE html>
<html>
<head>
<title>{{ song.title }}</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    overflow-y:auto;
    overflow-x:hidden;
    color:white;
}

.background{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-image:url('{{ song.cover_image.url }}');
    background-size:cover;
    background-position:center;
    filter:blur(50px);
    transform:scale(1.2);
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.65);
}

.back{
    position:absolute;
    top:30px;
    left:30px;
    color:white;
    text-decoration:none;
    font-size:20px;
    z-index:10;
}

.container{
    position:relative;
    z-index:5;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    min-height:100vh;
    padding:80px 0;
}

.cover{
    width:400px;
    height:400px;
    object-fit:cover;
    border-radius:30px;
    box-shadow:0 20px 80px rgba(0,0,0,.7);
}

h1{
    margin-top:40px;
    font-size:55px;
}

h2{
    color:#ddd;
    margin-top:10px;
    font-weight:normal;
}

audio{
    display:none;
}

.controls{
    margin-top:40px;
    display:flex;
    align-items:center;
}

.controls button{
    width:80px;
    height:80px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    color:white;
    font-size:35px;
    margin:0 15px;
    cursor:pointer;
    transition:.3s;
}

.controls button:hover{
    background:#fa243c;
}

.controls a{
    text-decoration:none;
}

.progress-container{
    width:500px;
    display:flex;
    align-items:center;
    gap:15px;
    margin-top:40px;
}

#progress{
    flex:1;
}

.favorite{
    margin-top:40px;
}

.favorite a{
    text-decoration:none;
}

.favorite button{
    background:#222;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:30px;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

.favorite button:hover{
    background:#fa243c;
}

.playlists{
    margin-top:25px;
    width:420px;
}

.playlists h3{
    margin-bottom:10px;
    text-align:center;
}

.playlists a{
    display:block;
    margin-bottom:10px;
    padding:12px;
    border-radius:10px;
    background:#222;
    color:white;
    text-decoration:none;
    text-align:center;
    transition:.3s;
}

.playlists a:hover{
    background:#fa243c;
}

</style>

</head>

<body data-next-song="{% if next_song %}{{ next_song.id }}{% endif %}">

<div class="background"></div>
<div class="overlay"></div>

<a href="/" class="back">
← Home
</a>

<div class="container">

<img class="cover"
src="{{ song.cover_image.url }}">

<h1>{{ song.title }}</h1>

<h2>{{ song.artist }}</h2>

<audio id="player">
    <source src="{{ song.audio_file.url }}">
</audio>

<div class="controls">

{% if previous_song %}
<a href="/song/{{ previous_song.id }}/">
<button>⏮</button>
</a>
{% endif %}

<button onclick="togglePlay()" id="playButton">
▶
</button>

{% if next_song %}
<a href="/song/{{ next_song.id }}/">
<button>⏭</button>
</a>
{% endif %}

</div>

<div class="progress-container">

<span id="currentTime">
0:00
</span>

<input
    type="range"
    id="progress"
    value="0"
    min="0"
    max="100"
    step="0.1">

<span id="duration">
0:00
</span>

</div>

<div class="favorite">

<a href="/favorites/add/{{ song.id }}/">

<button>
❤️ Favorite
</button>

</a>

</div>

{% if user.is_authenticated %}

<div class="playlists">

<h3>
➕ Add to Playlist
</h3>

{% for playlist in playlists %}

<a href="{% url 'add_song_to_playlist' playlist.id song.id %}">
    {{ playlist.name }}
</a>

{% empty %}

<p style="text-align:center;color:#ccc;">
Create a playlist first.
</p>

{% endfor %}

</div>

{% endif %}

</div>

<script>
const player = document.getElementById("player");
const playButton = document.getElementById("playButton");
const progress = document.getElementById("progress");
const currentTime = document.getElementById("currentTime");
const duration = document.getElementById("duration");

let isDragging = false;

function togglePlay() {

    if (player.paused) {
        player.play();
        playButton.innerHTML = "⏸";
    } else {
        player.pause();
        playButton.innerHTML = "▶";
    }

}

player.addEventListener("loadedmetadata", () => {

    progress.min = 0;
    progress.max = player.duration;
    progress.step = 0.1;

    duration.innerHTML = formatTime(player.duration);

});

player.addEventListener("timeupdate", () => {

    if (!isDragging) {
        progress.value = player.currentTime;
    }

    currentTime.innerHTML = formatTime(player.currentTime);

});

progress.addEventListener("mousedown", () => {
    isDragging = true;
});

progress.addEventListener("mouseup", () => {
    isDragging = false;
    player.currentTime = parseFloat(progress.value);
});

progress.addEventListener("input", () => {

    if (isDragging) {
        currentTime.innerHTML = formatTime(progress.value);
    }

});

function formatTime(seconds) {

    let minutes = Math.floor(seconds / 60);
    seconds = Math.floor(seconds % 60);

    if (seconds < 10) {
        seconds = "0" + seconds;
    }

    return minutes + ":" + seconds;

}

const nextSong = document.body.dataset.nextSong;

player.addEventListener("ended", () => {

    if (nextSong) {
        window.location.href = "/song/" + nextSong + "/";
    }

});
</script>

</body>
</html>
