{% extends 'base.html' %}

{% block content %}

<h1 class="section-title">
    💿 {{ album.album }}
</h1>

<p style="
    color:#b3b3b3;
    margin-bottom:35px;
    font-size:18px;
">
    🎤 {{ album.artist }}
</p>

<div style="text-align:center;margin-bottom:40px;">

    <img
        src="{{ album.cover_image.url }}"
        alt="{{ album.album }}"
        style="
            width:320px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.4);
        "
    >

</div>

<h2 style="margin-bottom:20px;">
    🎵 Songs
</h2>

<div class="cards">

{% for song in songs %}

    {% include "components/song_card.html" with song=song %}

{% empty %}

<h2>
    No songs found in this album.
</h2>

{% endfor %}

</div>

<div style="margin-top:40px;">

    <a
        href="{% url 'albums' %}"
        style="
            display:inline-block;
            padding:12px 20px;
            background:#333;
            color:white;
            text-decoration:none;
            border-radius:10px;
        "
    >
        ← Back to Albums
    </a>

</div>

{% endblock %}
