<!DOCTYPE html>
<html>
<head>
    <title>{{ song.title }}</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:-apple-system,BlinkMacSystemFont,sans-serif;
        }

        body{
            background:#000;
            color:white;
        }

        .container{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            gap:80px;
        }

        .cover{
            width:450px;
            border-radius:30px;
            box-shadow:0 20px 60px rgba(255,255,255,.15);
        }

        .info{
            max-width:500px;
        }

        .title{
            font-size:60px;
            font-weight:bold;
            margin-bottom:15px;
        }

        .artist{
            font-size:30px;
            color:#aaa;
            margin-bottom:40px;
        }

        audio{
            width:500px;
        }

        .back{
            position:absolute;
            top:30px;
            left:30px;
            color:white;
            text-decoration:none;
            font-size:20px;
        }
    </style>
</head>
<body>

<a href="/" class="back">← Home</a>

<div class="container">

    <img class="cover" src="{{ song.cover_image.url }}">

    <div class="info">

        <div class="title">
            {{ song.title }}
        </div>

        <div class="artist">
            {{ song.artist }}
        </div>

        <audio controls autoplay>
            <source src="{{ song.audio_file.url }}" type="audio/mpeg">
        </audio>

    </div>

</div>

</body>
</html>
