<a
    href="/song/{{ song.id }}/"
    class="card"
    style="
        text-decoration:none;
        color:white;
        display:block;
        border-radius:18px;
        overflow:hidden;
        background:#181818;
        transition:transform .25s ease, box-shadow .25s ease;
        box-shadow:0 8px 25px rgba(0,0,0,.35);
    "

    onmouseover="
        this.style.transform='translateY(-8px) scale(1.03)';
        this.style.boxShadow='0 18px 40px rgba(0,0,0,.55)';
    "

    onmouseout="
        this.style.transform='translateY(0) scale(1)';
        this.style.boxShadow='0 8px 25px rgba(0,0,0,.35)';
    "
>

    <img
        src="{{ song.cover_image.url }}"
        alt="{{ song.title }}"
        style="
            width:100%;
            height:220px;
            object-fit:cover;
            display:block;
        "
    >

    <div style="padding:16px;">

        <h3
            style="
                margin:0;
                font-size:18px;
                white-space:nowrap;
                overflow:hidden;
                text-overflow:ellipsis;
            "
        >
            {{ song.title }}
        </h3>

        <p
            style="
                color:#b3b3b3;
                margin-top:8px;
                margin-bottom:0;
                font-size:15px;
            "
        >
            🎤 {{ song.artist }}
        </p>

    </div>

</a>
